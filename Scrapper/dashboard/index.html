<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tender DAAS — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- React -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<!-- REQUIRED: PropTypes -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

<!-- REQUIRED: Recharts dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash/4.17.21/lodash.min.js"></script>

<!-- Recharts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
:root {
  --bg:       #0b0c0e;
  --surface:  #111214;
  --surface2: #18191d;
  --border:   #252629;
  --border2:  #2e3035;
  --text:     #e8e9ec;
  --muted:    #5a5d66;
  --muted2:   #7a7d88;
  --accent:   #f97316;
  --accent2:  #fb923c;
  --green:    #22c55e;
  --yellow:   #eab308;
  --red:      #ef4444;
  --blue:     #3b82f6;
  --purple:   #a855f7;
  --cyan:     #06b6d4;
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'Syne', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { height:100%; }
body { background:var(--bg); color:var(--text); font-family:var(--font-sans); overflow:hidden; }
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:var(--surface); }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* Layout */
.layout { display:flex; height:100vh; }
.sidebar {
  width:220px; min-width:220px; background:var(--surface);
  border-right:1px solid var(--border); display:flex;
  flex-direction:column; overflow:hidden;
}
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar {
  height:52px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 24px;
  gap:12px; background:var(--surface); flex-shrink:0;
}
.content { flex:1; overflow-y:auto; padding:24px; }

/* Sidebar */
.sidebar-logo {
  padding:20px 16px 12px;
  border-bottom:1px solid var(--border);
}
.logo-mark {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  color:var(--accent); letter-spacing:2px; text-transform:uppercase;
}
.logo-sub { font-size:10px; color:var(--muted); margin-top:2px; font-family:var(--font-mono); }
.nav { flex:1; overflow-y:auto; padding:8px 0; }
.nav-section { padding:16px 16px 4px; font-size:9px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-family:var(--font-mono); }
.nav-item {
  display:flex; align-items:center; gap:10px; padding:8px 16px;
  cursor:pointer; font-size:13px; color:var(--muted2); transition:all .15s;
  border-left:2px solid transparent; font-family:var(--font-sans); font-weight:600;
}
.nav-item:hover { color:var(--text); background:var(--surface2); }
.nav-item.active { color:var(--accent); border-left-color:var(--accent); background:rgba(249,115,22,.07); }
.nav-icon { width:16px; text-align:center; font-size:14px; }
.sidebar-footer {
  padding:12px 16px; border-top:1px solid var(--border);
  font-family:var(--font-mono); font-size:10px; color:var(--muted);
}

/* Topbar */
.page-title { font-size:15px; font-weight:700; color:var(--text); }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.refresh-time { font-family:var(--font-mono); font-size:11px; color:var(--muted); }

/* Buttons */
.btn {
  padding:7px 14px; border-radius:6px; border:none; cursor:pointer;
  font-size:12px; font-weight:700; font-family:var(--font-sans);
  display:inline-flex; align-items:center; gap:6px; transition:all .15s;
  letter-spacing:.3px;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent2); }
.btn-ghost { background:var(--surface2); color:var(--muted2); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); border-color:var(--border2); }
.btn-danger { background:rgba(239,68,68,.15); color:var(--red); border:1px solid rgba(239,68,68,.3); }
.btn-danger:hover { background:rgba(239,68,68,.25); }
.btn-green { background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.3); }
.btn-green:hover { background:rgba(34,197,94,.25); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

/* Cards & Panels */
.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; overflow:hidden;
}
.card-header {
  padding:14px 18px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.card-title { font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; color:var(--muted2); font-family:var(--font-mono); }
.card-body { padding:18px; }

/* KPI Grid */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin-bottom:20px; }
.kpi {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:16px; position:relative; overflow:hidden;
}
.kpi::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--accent-color, var(--accent));
}
.kpi-value { font-family:var(--font-mono); font-size:28px; font-weight:700;
  color:var(--accent-color, var(--accent)); line-height:1; }
.kpi-label { font-size:11px; color:var(--muted); margin-top:6px;
  text-transform:uppercase; letter-spacing:.8px; font-weight:700; }
.kpi-sub { font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-top:4px; }

/* Tables */
.tbl-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:9px 14px; background:var(--surface2);
  color:var(--muted); font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:1px; border-bottom:1px solid var(--border); white-space:nowrap;
  font-family:var(--font-mono); }
td { padding:9px 14px; border-bottom:1px solid var(--border);
  color:var(--text); font-size:12px; font-family:var(--font-mono); }
tr:hover td { background:rgba(255,255,255,.02); }
tr:last-child td { border-bottom:none; }

/* Badges */
.badge {
  display:inline-flex; align-items:center; padding:2px 8px;
  border-radius:4px; font-size:10px; font-weight:700;
  font-family:var(--font-mono); letter-spacing:.5px; text-transform:uppercase;
}
.badge-success { background:rgba(34,197,94,.15); color:var(--green); }
.badge-error   { background:rgba(239,68,68,.15);  color:var(--red); }
.badge-warning { background:rgba(234,179,8,.15);   color:var(--yellow); }
.badge-open    { background:rgba(59,130,246,.15);  color:var(--blue); }
.badge-closed  { background:rgba(90,93,102,.2);    color:var(--muted2); }
.badge-awarded { background:rgba(168,85,247,.15);  color:var(--purple); }
.badge-info    { background:rgba(6,182,212,.15);   color:var(--cyan); }
.badge-running { background:rgba(249,115,22,.15);  color:var(--accent); }
.badge-killed  { background:rgba(239,68,68,.1);    color:var(--muted2); }
.badge-pending { background:rgba(234,179,8,.1);    color:var(--yellow); }

/* Grid layout helpers */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.gap-16 { gap:16px; }
.mb-16 { margin-bottom:16px; }
.mb-20 { margin-bottom:20px; }
.flex { display:flex; }
.flex-col { flex-direction:column; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-8 { gap:8px; }
.gap-12 { gap:12px; }

/* Charts */
.chart-wrap { width:100%; }

/* Loading / Empty */
.loading { display:flex; align-items:center; justify-content:center;
  padding:48px; color:var(--muted); font-family:var(--font-mono); font-size:12px; }
.empty { display:flex; align-items:center; justify-content:center;
  padding:32px; color:var(--muted); font-size:12px; flex-direction:column; gap:8px; }
.spin { display:inline-block; width:14px; height:14px; border:2px solid var(--border2);
  border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Health day grid */
.day-grid { display:flex; gap:3px; flex-wrap:wrap; }
.day-cell { width:14px; height:14px; border-radius:2px; }
.day-success { background:var(--green); }
.day-error   { background:var(--red); }
.day-empty   { background:var(--border2); }

/* Progress bar */
.prog-row { display:flex; align-items:center; gap:12px; padding:6px 0; border-bottom:1px solid var(--border); }
.prog-label { width:160px; font-size:12px; color:var(--muted2); font-family:var(--font-mono); flex-shrink:0; }
.prog-bar-bg { flex:1; height:6px; background:var(--border2); border-radius:3px; overflow:hidden; }
.prog-bar    { height:100%; border-radius:3px; transition:width .5s; }
.prog-pct    { width:40px; text-align:right; font-family:var(--font-mono); font-size:12px; font-weight:700; }

/* Validation */
.val-card { border-radius:8px; border:1px solid var(--border); margin-bottom:12px; overflow:hidden; }
.val-header { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--surface2); cursor:pointer; }
.val-name { font-weight:700; font-size:13px; flex:1; }
.val-body { padding:12px 16px; border-top:1px solid var(--border); }
.val-desc { font-size:12px; color:var(--muted2); margin-bottom:10px; }

/* Log stream */
.log-box {
  background:#050506; border:1px solid var(--border); border-radius:6px;
  padding:12px; font-family:var(--font-mono); font-size:11px;
  color:#7aff7a; height:200px; overflow-y:auto; line-height:1.8;
}

/* Diff */
.diff-added   { background:rgba(34,197,94,.08);  border-left:3px solid var(--green); }
.diff-removed { background:rgba(239,68,68,.08);   border-left:3px solid var(--red); }
.diff-changed { background:rgba(234,179,8,.06);   border-left:3px solid var(--yellow); }

/* Alert items */
.alert-item { display:flex; gap:12px; padding:12px 16px; border-bottom:1px solid var(--border); align-items:flex-start; }
.alert-dot { width:8px; height:8px; border-radius:50%; margin-top:4px; flex-shrink:0; }
.alert-critical { background:var(--red); box-shadow:0 0 6px var(--red); }
.alert-warning  { background:var(--yellow); box-shadow:0 0 6px var(--yellow); }
.alert-info     { background:var(--blue); }

/* Filter row */
.filter-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.filter-select {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  padding:6px 10px; border-radius:6px; font-size:12px; font-family:var(--font-mono);
  cursor:pointer;
}
.filter-select:focus { outline:none; border-color:var(--accent); }

/* Section divider */
.section-gap { height:20px; }
.page-header { margin-bottom:20px; }
.page-header h2 { font-size:18px; font-weight:800; color:var(--text); }
.page-header p  { font-size:12px; color:var(--muted); margin-top:4px; font-family:var(--font-mono); }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const {
  LineChart, Line, BarChart, Bar, PieChart, Pie, Cell,
  XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer,
  AreaChart, Area,
} = Recharts;

// ── Config ───────────────────────────────────────────────────
const PORTALS = ['seci', 'cppp'];
const COLORS = {
  accent:'#f97316', green:'#22c55e', yellow:'#eab308',
  red:'#ef4444', blue:'#3b82f6', purple:'#a855f7', cyan:'#06b6d4',
  muted:'#5a5d66',
};
const CHART_COLORS = ['#f97316','#3b82f6','#22c55e','#a855f7','#06b6d4','#eab308','#ef4444'];

// ── Helpers ───────────────────────────────────────────────────
const api = async (path) => {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
};
const post = async (path, body) => {
  const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
};
const fmt = {
  inr: (v) => {
    if (!v && v !== 0) return '—';
    if (v >= 1e7) return '₹' + (v/1e7).toFixed(2) + ' Cr';
    if (v >= 1e5) return '₹' + (v/1e5).toFixed(2) + ' L';
    return '₹' + Number(v).toLocaleString('en-IN');
  },
  date: (s) => {
    if (!s) return '—';
    return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  },
  datetime: (s) => {
    if (!s) return '—';
    return new Date(s).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  },
  dur: (s) => {
    if (!s) return '—';
    if (s < 60) return s + 's';
    return Math.floor(s/60) + 'm ' + (s%60) + 's';
  },
  trunc: (s, n=50) => s && s.length > n ? s.slice(0,n)+'…' : (s||'—'),
};

// ── Badge ─────────────────────────────────────────────────────
function Badge({v}) {
  const map = {
    success:'badge-success', error:'badge-error', warning:'badge-warning',
    open:'badge-open', closed:'badge-closed', awarded:'badge-awarded',
    running:'badge-running', killed:'badge-killed', pending:'badge-pending',
    critical:'badge-error', info:'badge-info',
  };
  return React.createElement('span',{className:'badge '+(map[v]||'badge-info')},v);
}

// ── KPI Card ─────────────────────────────────────────────────
function KPI({label, value, sub, color}) {
  return React.createElement('div',{className:'kpi', style:{'--accent-color':color||COLORS.accent}},
    React.createElement('div',{className:'kpi-value'},value??'—'),
    React.createElement('div',{className:'kpi-label'},label),
    sub && React.createElement('div',{className:'kpi-sub'},sub),
  );
}

// ── Loading ───────────────────────────────────────────────────
function Loading() {
  return React.createElement('div',{className:'loading'},
    React.createElement('span',{className:'spin'}),
    React.createElement('span',{style:{marginLeft:8}},'Loading...')
  );
}

// ── Tooltip ──────────────────────────────────────────────────
const ChartTooltip = ({active,payload,label}) => {
  if (!active || !payload?.length) return null;
  return React.createElement('div',{style:{
    background:'#18191d', border:'1px solid #252629', borderRadius:6,
    padding:'8px 12px', fontSize:11, fontFamily:'JetBrains Mono,monospace',
  }},
    React.createElement('div',{style:{color:'#7a7d88',marginBottom:4}},label),
    payload.map((p,i) => React.createElement('div',{key:i,style:{color:p.color}},
      `${p.name}: ${p.value}`
    ))
  );
};

// ══════════════════════════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════════════════════════

// ── 1. Overview ───────────────────────────────────────────────
function ViewOverview() {
  const [data, setData] = useState(null);
  const [analytics, setAnalytics] = useState(null);
  useEffect(() => {
    api('/api/stats').then(setData).catch(()=>{});
    api('/api/analytics').then(setAnalytics).catch(()=>{});
  }, []);

  if (!data) return React.createElement(Loading);

  const kpis = [
    {label:'Total Tenders', value: data.total_tenders, color: COLORS.accent},
    {label:'Live / Open',   value: data.by_status.find(s=>s.status==='open')?.count||0, color:COLORS.green},
    {label:'Archived',      value: data.by_status.find(s=>s.status==='closed')?.count||0, color:COLORS.yellow},
    {label:'Awarded',       value: data.by_status.find(s=>s.status==='awarded')?.count||0, color:COLORS.purple},
    {label:'Added 24h',     value: data.added_24h, color: COLORS.cyan},
    {label:'Added 7d',      value: data.added_7d, color: COLORS.blue},
    {label:'With EMD',      value: data.with_emd, color: COLORS.green},
    {label:'Total Docs',    value: data.total_document_urls, color: COLORS.muted},
    {label:'Successful Runs', value: data.success_runs, color: COLORS.green},
    {label:'Failed Runs',   value: data.failed_runs, color: COLORS.red},
  ];

  const dailyData = analytics?.daily_new?.map(d => ({
    day: new Date(d.day).toLocaleDateString('en-IN',{day:'2-digit',month:'short'}),
    count: d.cnt,
  })) || [];

  return React.createElement('div',null,
    React.createElement('div',{className:'page-header'},
      React.createElement('h2',null,'Overview'),
      React.createElement('p',null,'System-wide summary across all portals')
    ),
    React.createElement('div',{className:'kpi-grid'},
      kpis.map((k,i) => React.createElement(KPI,{key:i,...k}))
    ),
    React.createElement('div',{className:'grid-2 mb-20'},
      // Category breakdown
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-header'},
          React.createElement('span',{className:'card-title'},'Tenders by Category')
        ),
        React.createElement('div',{className:'card-body'},
          React.createElement(ResponsiveContainer,{width:'100%',height:240},
            React.createElement(BarChart,{data:data.by_category,layout:'vertical',margin:{left:20}},
              React.createElement(CartesianGrid,{strokeDasharray:'3 3',stroke:'#252629'}),
              React.createElement(XAxis,{type:'number',tick:{fill:'#5a5d66',fontSize:10},stroke:'#252629'}),
              React.createElement(YAxis,{type:'category',dataKey:'category',tick:{fill:'#7a7d88',fontSize:10},width:120,stroke:'#252629'}),
              React.createElement(Tooltip,{content:React.createElement(ChartTooltip)}),
              React.createElement(Bar,{dataKey:'count',fill:COLORS.accent,radius:[0,3,3,0]})
            )
          )
        )
      ),
      // Daily new tenders
      React.createElement('div',{className:'card'},
        React.createElement('div',{className:'card-header'},
          React.createElement('span',{className:'card-title'},'New Tenders — Last 30 Days')
        ),
        React.createElement('div',{className:'card-body'},
          React.createElement(ResponsiveContainer,{width:'100%',height:240},
            React.createElement(AreaChart,{data:dailyData},
              React.createElement('defs',null,
                React.createElement('linearGradient',{id:'areaGrad',x1:'0',y1:'0',x2:'0',y2:'1'},
                  React.createElement('stop',{offset:'5%',stopColor:COLORS.accent,stopOpacity:.25}),
                  React.createElement('stop',{offset:'95%',stopColor:COLORS.accent,stopOpacity:.02})
                )
              ),
              React.createElement(CartesianGrid,{strokeDasharray:'3 3',stroke:'#252629'}),
              React.createElement(XAxis,{dataKey:'day',tick:{fill:'#5a5d66',fontSize:9},stroke:'#252629'}),
              React.createElement(YAxis,{tick:{fill:'#5a5d66',fontSize:10},stroke:'#252629'}),
              React.createElement(Tooltip,{content:React.createElement(ChartTooltip)}),
              React.createElement(Area,{type:'monotone',dataKey:'count',stroke:COLORS.accent,fill:'url(#areaGrad)',strokeWidth:2})
            )
          )
        )
      )
    )
  );
}

// ── 2. Run History ────────────────────────────────────────────
function ViewRunHistory() {
  const [runs, setRuns] = useState(null);
  const [filterPortal, setFilterPortal] = useState('');
  const [filterStatus, setFilterStatus] = useState('');

  const load = () => {
    let url = '/api/runs?limit=100';
    if (filterPortal) url += `&portal=${filterPortal}`;
    if (filterStatus) url += `&status=${filterStatus}`;
    api(url).then(d => setRuns(d.runs)).catch(()=>{});
  };
  useEffect(load, [filterPortal, filterStatus]);

  return React.createElement('div',null,
    React.createElement('div',{className:'page-header'},
      React.createElement('h2',null,'Run History'),
      React.createElement('p',null,'All scraper pipeline executions')
    ),
    React.createElement('div',{className:'filter-row'},
      React.createElement('select',{className:'filter-select',value:filterPortal,onChange:e=>setFilterPortal(e.target.value)},
        React.createElement('option',{value:''},'All Portals'),
        PORTALS.map(p => React.createElement('option',{key:p,value:p},p.toUpperCase()))
      ),
      React.createElement('select',{className:'filter-select',value:filterStatus,onChange:e=>setFilterStatus(e.target.value)},
        React.createElement('option',{value:''},'All Statuses'),
        ['success','error','running'].map(s => React.createElement('option',{key:s,value:s},s))
      ),
      React.createElement('button',{className:'btn btn-ghost btn-sm',onClick:load},'↻ Refresh')
    ),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'tbl-wrap'},
        !runs ? React.createElement(Loading) :
        React.createElement('table',null,
          React.createElement('thead',null, React.createElement('tr',null,
            ['Portal','Status','Found','New','Updated','Duration','Started','Trigger','Error'].map(h =>
              React.createElement('th',{key:h},h)
            )
          )),
          React.createElement('tbody',null,
            runs.map(r => React.createElement('tr',{key:r.id},
              React.createElement('td',null, React.createElement('span',{className:'badge badge-info'},r.portal?.toUpperCase())),
              React.createElement('td',null, React.createElement(Badge,{v:r.status})),
              React.createElement('td',null, r.records_found||0),

// ── 7. Jobs Monitor + Manual Trigger ─────────────────────────
function ViewJobs() {
  const [jobs, setJobs] = useState({active_jobs:[],running_in_db:[]});
  const [logs, setLogs] = useState(null);
  const [selectedJob, setSelectedJob] = useState(null);
  const [triggering, setTriggering] = useState(false);

  const loadJobs = () => api('/api/jobs').then(setJobs).catch(()=>{});
  useEffect(() => {
    loadJobs();
    const t = setInterval(loadJobs, 3000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!selectedJob) return;
    const t = setInterval(() => {
      api(`/api/job-logs/${selectedJob}`).then(setLogs).catch(()=>{});
    }, 1500);
    api(`/api/job-logs/${selectedJob}`).then(setLogs).catch(()=>{});
    return () => clearInterval(t);
  }, [selectedJob]);

  const trigger = async (portal) => {
    setTriggering(true);
    try {
      const r = await post(`/api/trigger/${portal}`);
      setSelectedJob(r.job_id);
      loadJobs();
    } catch(e) {
      alert('Failed: ' + e.message);
    } finally { setTriggering(false); }

  const kill = async (jobId) => {
    if (!confirm('Kill this job?')) return;
    await post(`/api/kill/${jobId}`);
    loadJobs();

  return React.createElement('div',null,

// ── 11. Data Quality + Validation ────────────────────────────
function ViewQuality() {
  const [quality, setQuality] = useState(null);
  const [validation, setValidation] = useState(null);
  const [validating, setValidating] = useState(false);
  const [expanded, setExpanded] = useState({});

  useEffect(() => { api('/api/quality').then(setQuality).catch(()=>{}); }, []);

  const runValidation = async () => {
    setValidating(true);
    try {
      const d = await api('/api/validate');
      setValidation(d);
    } catch(e) { console.error(e); }
    finally { setValidating(false); }
  };

  const toggle = (id) => setExpanded(e => ({...e,[id]:!e[id]}));

  const sevColor = {critical:COLORS.red, warning:COLORS.yellow, info:COLORS.cyan};

  return React.createElement('div',null,
    React.createElement('div',{className:'page-header'},
      React.createElement('h2',null,'Data Quality & Validation'),

    ),
    // Quality scores
    quality && React.createElement('div',null,
      React.createElement('div',{className:'kpi-grid mb-20'},
        React.createElement(KPI,{label:'Overall Quality Score', value:quality.score+'%',
          color: quality.score>=80?COLORS.green:quality.score>=60?COLORS.yellow:COLORS.red}),
        React.createElement(KPI,{label:'Total Tenders Analyzed', value:quality.total, color:COLORS.blue}),
      ),
      React.createElement('div',{className:'card mb-20'},
        React.createElement('div',{className:'card-header'},React.createElement('span',{className:'card-title'},'Field Completeness')),
        React.createElement('div',{className:'card-body'},
          Object.entries(quality.checks).map(([label,v]) => {
            const color = v.pct>=80?COLORS.green:v.pct>=50?COLORS.yellow:COLORS.red;
            return React.createElement('div',{key:label,className:'prog-row'},
              React.createElement('div',{className:'prog-label'},label),
              React.createElement('div',{className:'prog-bar-bg'},
                React.createElement('div',{className:'prog-bar',style:{width:v.pct+'%',background:color}})

      )

    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'card-header'},

        React.createElement('div',{className:'flex gap-8 items-center'},
          validation && React.createElement('span',{style:{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--muted)'}},
            `${validation.summary.passed}/${validation.summary.total} passed (${validation.summary.score}%)`

        )

              'Click "Run All Checks" to validate your data'

            validation.results.map(r => {
              const isOpen = expanded[r.id];

// ROOT APP
// ══════════════════════════════════════════════════════════════
function App() {
  const [active, setActive] = useState('overview');
  const [time, setTime]     = useState(new Date().toLocaleTimeString());

  useEffect(() => {
    const t = setInterval(() => setTime(new Date().toLocaleTimeString()), 1000);
    return () => clearInterval(t);
  }, []);

  const current = NAV.find(n => n.id === active);
  const View = current?.view;

  // Alert badge count
  const [alertCount, setAlertCount] = useState(0);
  useEffect(() => {
    const load = () => api('/api/alerts').then(d=>setAlertCount(d.count)).catch(()=>{});
    load();
    const t = setInterval(load, 30000);
    return () => clearInterval(t);
  }, []);

  return React.createElement('div',{className:'layout'},
    // Sidebar
    React.createElement('aside',{className:'sidebar'},
      React.createElement('div',{className:'sidebar-logo'},
        React.createElement('div',{className:'logo-mark'},'TENDER'),

        React.createElement('div',{className:'logo-sub'},'Admin Dashboard v2')
      ),
      React.createElement('nav',{className:'nav'},
        NAV.map((item,i) => {
          if (item.section) return React.createElement('div',{key:i,className:'nav-section'},item.section);
          return React.createElement('div',{
            key:item.id, className:'nav-item '+(active===item.id?'active':''),
            onClick:()=>setActive(item.id),
          },
            React.createElement('span',{className:'nav-icon'},item.icon),
            React.createElement('span',null,item.label),
            item.id==='alerts' && alertCount>0 && React.createElement('span',{
              style:{marginLeft:'auto',background:COLORS.red,color:'#fff',borderRadius:10,
                fontSize:9,padding:'1px 6px',fontFamily:'var(--font-mono)',fontWeight:700}
            },alertCount)
          );
        })
      ),
      React.createElement('div',{className:'sidebar-footer'},
        React.createElement('div',null,'🟢 ONLINE'),
        React.createElement('div',{style:{marginTop:3}},time)
      )
    ),
    // Main
    React.createElement('main',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('span',{className:'page-title'},current?.label||''),
        React.createElement('div',{className:'topbar-right'},

        )
      ),
      React.createElement('div',{className:'content'},
        View ? React.createElement(View) : React.createElement('div',{className:'loading'},'Not found')
      )
    )
  );
}
